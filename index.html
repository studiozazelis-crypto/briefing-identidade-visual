<style>
:root{
  --bg:#161616;
  --fg:#FFFFFF;
  --muted:rgba(255,255,255,.60);
  --faint:rgba(255,255,255,.35);
  --line:rgba(255,255,255,.14);
  --accent:#B2B6BB;
  --accent-strong:#E9ECEF;
  --danger:#FF9B9B;
  --metal:linear-gradient(180deg,#EDEFF2 0%,#B2B6BB 55%,#8F959B 100%);
  --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;background:var(--bg);color:var(--fg);
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:16px;line-height:1.6;
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;min-height:100dvh;overflow:hidden;
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(55% 38% at 50% 0%,rgba(255,255,255,.055),transparent 65%);}
::selection{background:var(--accent);color:#161616}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- Header ---------- */
header.top{display:flex;justify-content:center;padding:26px 20px 14px;flex:none;position:relative;z-index:5}
header.top img{height:clamp(30px,4.6vw,46px);width:auto;filter:drop-shadow(0 3px 14px rgba(0,0,0,.55))}

/* ---------- Stage / slides ---------- */
main{flex:1;position:relative;overflow:hidden;z-index:1}
.slide{
  position:absolute;inset:0;overflow-y:auto;display:flex;
  padding:12px clamp(20px,6vw,76px) 28px;
  transition:opacity .48s var(--ease),transform .48s var(--ease);
}
.slide .inner{margin:auto;width:100%;max-width:1080px}
.slide.enter-r{opacity:0;transform:translateX(48px)}
.slide.enter-l{opacity:0;transform:translateX(-48px)}
.slide.leave-l{opacity:0;transform:translateX(-48px);pointer-events:none}
.slide.leave-r{opacity:0;transform:translateX(48px);pointer-events:none}

/* ---------- Question layout ---------- */
.grid{display:grid;grid-template-columns:minmax(0,5fr) minmax(0,6fr);gap:clamp(30px,5vw,76px);align-items:center}
.qleft{position:relative}
.ghost{position:absolute;top:-58px;left:-16px;z-index:0;line-height:1;user-select:none;pointer-events:none;
  font-weight:700;font-size:clamp(96px,13vw,176px);letter-spacing:-.04em;color:rgba(255,255,255,.035)}
.qleft .content{position:relative;z-index:1}
.kicker{font-size:11px;font-weight:700;letter-spacing:.20em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
.kicker .opt-tag{color:var(--faint);font-weight:400}
h1.qt{margin:0 0 14px;font-weight:700;font-size:clamp(24px,3vw,37px);line-height:1.16;letter-spacing:-.02em}
p.qd{margin:0;color:var(--muted);font-size:15.5px;max-width:48ch}

/* ---------- Inputs ---------- */
.field input[type=text],.field textarea{
  width:100%;background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:14px;
  color:var(--fg);padding:16px 18px;font:inherit;outline:none;
  transition:border-color .25s,box-shadow .25s,background .25s;
}
.field textarea{min-height:150px;resize:vertical}
.field input:focus,.field textarea:focus{
  border-color:var(--accent);background:rgba(255,255,255,.055);
  box-shadow:0 0 0 3px rgba(178,182,187,.14);
}
::placeholder{color:var(--faint)}

/* Options (radio / multi / yes-no) */
.opts{display:flex;flex-direction:column;gap:9px;max-height:52vh;overflow-y:auto;padding:2px 6px 2px 2px}
.optrow{display:flex;gap:10px}
.optrow .opt{flex:1;justify-content:center}
.opt{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:12px;
  padding:13px 16px;color:var(--fg);cursor:pointer;font:inherit;font-size:15px;
  transition:border-color .22s,background .22s,color .22s,transform .15s;
}
.opt:hover{border-color:rgba(178,182,187,.55);background:rgba(255,255,255,.06)}
.opt:active{transform:scale(.995)}
.opt.sel{background:var(--metal);color:#141414;border-color:transparent;font-weight:700}
.opt .box{flex:none;width:18px;height:18px;border:1.5px solid var(--accent);display:grid;place-items:center;color:transparent;transition:.2s}
.opt .box.sq{border-radius:5px}
.opt .box.rd{border-radius:50%}
.opt.sel .box{background:#141414;border-color:#141414;color:var(--accent-strong)}
.opt .box svg{width:11px;height:11px;display:block}
.otherwrap{margin-top:10px;display:none}
.otherwrap.show{display:block}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;max-height:46vh;overflow-y:auto;padding:2px 6px 2px 2px}
.chip{
  padding:8px 15px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.035);color:rgba(255,255,255,.86);
  font:inherit;font-size:13.5px;cursor:pointer;transition:border-color .2s,background .2s,color .2s,transform .12s;
}
.chip:hover{border-color:var(--accent);color:#fff}
.chip:active{transform:scale(.96)}
.chip.sel{background:var(--metal);color:#141414;border-color:transparent;font-weight:700}
.selcount{margin-top:12px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.selcount b{color:var(--accent-strong)}

/* Ack */
.ack{margin-bottom:14px}

/* Actions */
.actions{display:flex;align-items:center;gap:16px;margin-top:22px}
.btn{
  border:none;cursor:pointer;font:inherit;font-weight:700;font-size:15px;
  padding:15px 30px;border-radius:999px;color:#141414;background:var(--metal);
  display:inline-flex;align-items:center;gap:9px;
  box-shadow:0 6px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.75);
  transition:transform .2s var(--ease),filter .2s;
}
.btn:hover{filter:brightness(1.06);transform:translateY(-1px)}
.btn:active{transform:translateY(0) scale(.99)}
.btn[disabled]{opacity:.55;cursor:default;transform:none;filter:none}
.ghostbtn{
  background:none;border:1px solid var(--line);color:var(--muted);
  border-radius:999px;padding:10px 18px;cursor:pointer;font:inherit;font-size:13px;transition:.25s;
}
.ghostbtn:hover{color:#fff;border-color:var(--accent)}
.hint{font-size:12.5px;color:var(--faint)}
.hint b{color:var(--muted);font-weight:700}
.err{display:none;color:var(--danger);font-size:13.5px;margin-top:12px}
.err.show{display:block}
.shake{animation:shake .42s}
@keyframes shake{20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.spin{width:15px;height:15px;border:2px solid rgba(20,20,20,.35);border-top-color:#141414;border-radius:50%;animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ---------- Welcome / Thanks ---------- */
.hero{max-width:660px;margin:auto;text-align:center}
.hero h1{font-weight:700;font-size:clamp(34px,5vw,56px);letter-spacing:-.025em;line-height:1.08;margin:0 0 20px}
.hero p{color:var(--muted);font-size:17px;margin:0 auto 30px;max-width:52ch}
.hero .meta{margin-top:18px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
.okic{width:72px;height:72px;margin:0 auto 26px;border-radius:50%;
  background:var(--metal);display:grid;place-items:center;
  box-shadow:0 10px 30px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.8);
  animation:pop .6s var(--ease)}
.okic svg{width:32px;height:32px;stroke:#141414;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.okic path{stroke-dasharray:40;stroke-dashoffset:40;animation:draw .55s .25s var(--ease) forwards}
@keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes draw{to{stroke-dashoffset:0}}
.sent{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.panel{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.03);
  padding:22px;margin-top:30px;text-align:left}
.panel h3{margin:0 0 8px;font-size:15px}
.panel p{font-size:14px;color:var(--muted);margin:0 0 16px;max-width:none}
.panel .row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.panel textarea{width:100%;min-height:150px;background:rgba(0,0,0,.3);border:1px solid var(--line);
  border-radius:12px;color:var(--muted);font:12.5px/1.5 "Helvetica Neue",Helvetica,Arial,sans-serif;padding:14px;resize:vertical}

/* ---------- Footer / progress ---------- */
footer{flex:none;position:relative;z-index:5;transition:opacity .4s var(--ease)}
footer.off{opacity:0;pointer-events:none}
.dots{display:flex;gap:7px;justify-content:center;padding:4px 20px 12px;flex-wrap:wrap}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .35s var(--ease)}
.dot.done{background:var(--accent)}
.dot.cur{transform:scale(1.9);background:#fff;box-shadow:0 0 10px rgba(255,255,255,.8)}
.frow{display:flex;justify-content:space-between;align-items:center;
  padding:0 clamp(20px,6vw,76px) 14px}
.counter{font-size:12px;letter-spacing:.18em;color:var(--muted);font-variant-numeric:tabular-nums}
.counter b{color:var(--fg);font-weight:700}
.progress{height:2px;background:rgba(255,255,255,.09)}
.progress i{display:block;height:100%;width:0;
  background:linear-gradient(90deg,#8F959B,#EDEFF2);
  box-shadow:0 0 14px rgba(237,239,242,.5);
  transition:width .6s var(--ease)}

/* ---------- Responsive ---------- */
@media (max-width:900px){
  .grid{grid-template-columns:1fr;gap:26px;align-items:start}
  .ghost{display:none}
  h1.qt{font-size:clamp(21px,5.6vw,26px)}
  p.qd{font-size:14.5px}
  .hint{display:none}
  .actions .btn{flex:1;justify-content:center}
  .opts{max-height:none}
  .chips{max-height:38vh}
  .slide{padding:8px 22px 20px}
  .frow{padding:0 22px 12px}
}
@media (max-width:640px){.dots{display:none}}
footer{padding-bottom:env(safe-area-inset-bottom)}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>

var TOTAL = QUESTIONS.length;

/* ---------- Estado ---------- */
var answers = {};
var slides = [{ type:'welcome' }];
QUESTIONS.forEach(function(q,i){ slides.push({ type:'q', q:q, n:i+1 }); });
slides.push({ type:'thanks' });

var cur = 0;
var busy = false;
var submitted = false;
var sendState = null; /* 'ok' | 'fail' */

var stage = document.getElementById('stage');
var footer = document.getElementById('footer');
var fill = document.getElementById('fill');
var dotsEl = document.getElementById('dots');
var counterEl = document.getElementById('counter');
var btnBack = document.getElementById('btnBack');

/* ---------- Helpers ---------- */
function el(tag, cls, html){
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function esc(s){
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
var CHECK = '<svg viewBox="0 0 14 14"><path d="M2 7.5 5.5 11 12 3.5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var DOTsvg = '<svg viewBox="0 0 14 14"><circle cx="7" cy="7" r="4" fill="currentColor"/></svg>';

/* ---------- Pontinhos de etapas ---------- */
(function(){
  for (var i=0;i<TOTAL;i++) dotsEl.appendChild(el('span','dot'));
})();

function updateFooter(){
  var s = slides[cur];
  if (s.type !== 'q'){ footer.classList.add('off'); return; }
  footer.classList.remove('off');
  var n = s.n;
  counterEl.innerHTML = '<b>' + String(n).padStart(2,'0') + '</b> / ' + TOTAL;
  fill.style.width = (n/TOTAL*100) + '%';
  var dots = dotsEl.children;
  for (var i=0;i<dots.length;i++){
    dots[i].className = 'dot' + (i < n-1 ? ' done' : '') + (i === n-1 ? ' cur' : '');
  }
  btnBack.style.visibility = 'visible';
}

/* ---------- Navegação ---------- */
function targetIndex(from, dir){
  var i = from + dir;
  while (i > 0 && i < slides.length - 1){
    var s = slides[i];
    if (s.type === 'q' && s.q.skipIf && s.q.skipIf()) { i += dir; continue; }
    break;
  }
  return Math.max(0, Math.min(slides.length - 1, i));
}

function go(dir){
  if (busy) return;
  var t = targetIndex(cur, dir);
  if (t === cur) return;
  busy = true;
  var oldSlide = stage.querySelector('.slide');
  var next = buildSlide(slides[t]);
  next.classList.add(dir > 0 ? 'enter-r' : 'enter-l');
  stage.appendChild(next);
  next.getBoundingClientRect(); /* reflow */
  next.classList.remove('enter-r','enter-l');
  if (oldSlide){
    oldSlide.classList.add(dir > 0 ? 'leave-l' : 'leave-r');
    setTimeout(function(){ if (oldSlide.parentNode) oldSlide.parentNode.removeChild(oldSlide); }, 500);
  }
  cur = t;
  updateFooter();
  setTimeout(function(){
    busy = false;
    if (window.matchMedia('(pointer:fine)').matches){
      var f = next.querySelector('input[type=text], textarea');
      if (f) f.focus();
    }
  }, 380);
}

btnBack.addEventListener('click', function(){ go(-1); });

/* ---------- Construção dos slides ---------- */
function buildSlide(s){
  if (s.type === 'welcome') return buildWelcome();
  if (s.type === 'thanks')  return buildThanks();
  return buildQuestion(s);
}

function buildWelcome(){
  var slide = el('section','slide');
  var inner = el('div','inner');
  var hero = el('div','hero');
  hero.appendChild(el('h1', null, 'Bem-vindo(a)!'));
  hero.appendChild(el('p', null,
    'O intuito desse briefing é para que eu possa entender melhor o que você deseja e necessita, e te entregar o melhor resultado. Peço, por favor, que responda com a maior riqueza de detalhes possível.'));
  var b = el('button','btn','Começar &nbsp;→');
  b.type = 'button';
  b.addEventListener('click', function(){ go(1); });
  hero.appendChild(b);
  hero.appendChild(el('div','meta', TOTAL + ' perguntas &nbsp;·&nbsp; leva cerca de 10 minutos'));
  inner.appendChild(hero);
  slide.appendChild(inner);
  return slide;
}

function buildQuestion(s){
  var q = s.q, n = s.n;
  var slide = el('section','slide');
  var inner = el('div','inner');
  var grid = el('div','grid');

  /* esquerda */
  var left = el('div','qleft');
  left.appendChild(el('div','ghost', String(n).padStart(2,'0')));
  var content = el('div','content');
  var kick = (q.section ? esc(q.section) + ' &nbsp;·&nbsp; ' : '') + 'Pergunta ' + String(n).padStart(2,'0');
  if (!q.req) kick += ' <span class="opt-tag">&nbsp;·&nbsp; opcional</span>';
  content.appendChild(el('div','kicker', kick));
  content.appendChild(el('h1','qt', esc(q.title)));
  if (q.desc) content.appendChild(el('p','qd', esc(q.desc)));
  left.appendChild(content);

  /* direita */
  var right = el('div','qright');
  var field = el('div','field');
  buildInput(q, field);
  right.appendChild(field);
  var err = el('div','err');
  right.appendChild(err);

  var actions = el('div','actions');
  var isLast = (n === TOTAL);
  var nextBtn = el('button','btn', isLast ? 'Enviar briefing &nbsp;' + CHECK.replace('viewBox','width="14" height="14" viewBox') : 'Próxima &nbsp;→');
  nextBtn.type = 'button';
  nextBtn.addEventListener('click', function(){ onNext(slide, q, nextBtn); });
  actions.appendChild(nextBtn);
  var hintTxt = (q.type === 'textarea' || q.type === 'ack')
    ? 'pressione <b>Ctrl&nbsp;+&nbsp;Enter&nbsp;↵</b>'
    : 'pressione <b>Enter&nbsp;↵</b>';
  actions.appendChild(el('span','hint', hintTxt));
  right.appendChild(actions);

  grid.appendChild(left);
  grid.appendChild(right);
  inner.appendChild(grid);
  slide.appendChild(inner);
  return slide;
}

/* ---------- Inputs por tipo ---------- */
function clearErr(slide){
  var e = slide.querySelector('.err');
  if (e) e.classList.remove('show');
}

function buildInput(q, box){
  var v = answers[q.key];

  if (q.type === 'text'){
    var i = document.createElement('input');
    i.type = 'text';
    i.placeholder = q.placeholder || 'Digite aqui…';
    i.value = v || '';
    i.addEventListener('input', function(){ answers[q.key] = i.value; clearErr(box.closest('.slide')); });
    box.appendChild(i);
    return;
  }

  if (q.type === 'textarea'){
    var t = document.createElement('textarea');
    t.placeholder = q.placeholder || 'Digite aqui…';
    if (q.rows) t.style.minHeight = (q.rows * 34) + 'px';
    t.value = v || '';
    t.addEventListener('input', function(){ answers[q.key] = t.value; clearErr(box.closest('.slide')); });
    box.appendChild(t);
    return;
  }

  if (q.type === 'ack'){
    if (!v) v = answers[q.key] = { ok:false, extra:'' };
    var row = el('button','opt ack' + (v.ok ? ' sel' : ''));
    row.type = 'button';
    row.innerHTML = '<span class="box sq">' + CHECK + '</span><span>' + esc(q.ackLabel) + '</span>';
    row.addEventListener('click', function(){
      v.ok = !v.ok;
      row.classList.toggle('sel', v.ok);
      clearErr(box.closest('.slide'));
    });
    box.appendChild(row);
    var t = document.createElement('textarea');
    t.placeholder = q.placeholder || '';
    t.style.minHeight = '110px';
    t.value = v.extra || '';
    t.addEventListener('input', function(){ v.extra = t.value; });
    box.appendChild(t);
    return;
  }

  if (q.type === 'yesno'){
    var row = el('div','optrow');
    ['Sim','Não'].forEach(function(opt){
      var b = el('button','opt' + (v === opt ? ' sel' : ''));
      b.type = 'button';
      b.innerHTML = '<span class="box rd">' + DOTsvg + '</span><span>' + opt + '</span>';
      b.addEventListener('click', function(){
        answers[q.key] = opt;
        row.querySelectorAll('.opt').forEach(function(o){ o.classList.remove('sel'); });
        b.classList.add('sel');
        clearErr(box.closest('.slide'));
        setTimeout(function(){ if (!busy) go(1); }, 340);
      });
      row.appendChild(b);
    });
    box.appendChild(row);
    return;
  }

  if (q.type === 'radio'){
    if (!v) v = answers[q.key] = { choice:'', other:'' };
    var wrap = el('div','opts');
    var opts = q.options.slice();
    if (q.other) opts.push('__other');
    var otherWrap = el('div','otherwrap' + (v.choice === '__other' ? ' show' : ''));
    var oi = document.createElement('input');
    oi.type = 'text';
    oi.placeholder = 'Escreva aqui…';
    oi.value = v.other || '';
    oi.addEventListener('input', function(){ v.other = oi.value; clearErr(box.closest('.slide')); });
    otherWrap.appendChild(oi);

    opts.forEach(function(opt){
      var isOther = (opt === '__other');
      var b = el('button','opt' + (v.choice === opt ? ' sel' : ''));
      b.type = 'button';
      b.innerHTML = '<span class="box rd">' + DOTsvg + '</span><span>' + (isOther ? 'Outro' : esc(opt)) + '</span>';
      b.addEventListener('click', function(){
        v.choice = opt;
        wrap.querySelectorAll('.opt').forEach(function(o){ o.classList.remove('sel'); });
        b.classList.add('sel');
        otherWrap.classList.toggle('show', isOther);
        clearErr(box.closest('.slide'));
        if (isOther) { oi.focus(); }
        else setTimeout(function(){ if (!busy) go(1); }, 340);
      });
      wrap.appendChild(b);
    });
    box.appendChild(wrap);
    box.appendChild(otherWrap);
    return;
  }

  if (q.type === 'multi'){
    if (!v) v = answers[q.key] = { list:[], other:'' };
    var wrap = el('div','opts');
    var otherWrap = el('div','otherwrap' + (v.list.indexOf('Outro') >= 0 ? ' show' : ''));
    var oi = document.createElement('input');
    oi.type = 'text';
    oi.placeholder = 'Escreva aqui…';
    oi.value = v.other || '';
    oi.addEventListener('input', function(){ v.other = oi.value; clearErr(box.closest('.slide')); });
    otherWrap.appendChild(oi);

    var opts = q.options.slice();
    if (q.other) opts.push('Outro');
    opts.forEach(function(opt){
      var on = v.list.indexOf(opt) >= 0;
      var b = el('button','opt' + (on ? ' sel' : ''));
      b.type = 'button';
      b.innerHTML = '<span class="box sq">' + CHECK + '</span><span>' + esc(opt) + '</span>';
      b.addEventListener('click', function(){
        var ix = v.list.indexOf(opt);
        if (ix >= 0) v.list.splice(ix,1); else v.list.push(opt);
        b.classList.toggle('sel', ix < 0);
        if (opt === 'Outro'){
          otherWrap.classList.toggle('show', ix < 0);
          if (ix < 0) oi.focus();
        }
        clearErr(box.closest('.slide'));
      });
      wrap.appendChild(b);
    });
    box.appendChild(wrap);
    box.appendChild(otherWrap);
    return;
  }

  if (q.type === 'chips'){
    if (!v) v = answers[q.key] = [];
    var wrap = el('div','chips');
    var count = el('div','selcount');
    function upd(){ count.innerHTML = '<b>' + v.length + '</b> selecionada' + (v.length === 1 ? '' : 's'); }
    TRAITS.forEach(function(word){
      var c = el('button','chip' + (v.indexOf(word) >= 0 ? ' sel' : ''), esc(word));
      c.type = 'button';
      c.addEventListener('click', function(){
        var ix = v.indexOf(word);
        if (ix >= 0) v.splice(ix,1); else v.push(word);
        c.classList.toggle('sel', ix < 0);
        upd();
        clearErr(box.closest('.slide'));
      });
      wrap.appendChild(c);
    });
    upd();
    box.appendChild(wrap);
    box.appendChild(count);
    return;
  }

  if (q.type === 'pick3'){
    var pool = (answers.q12 || []).slice();
    var v3 = (answers[q.key] || []).filter(function(w){ return pool.indexOf(w) >= 0; });
    answers[q.key] = v3;
    var wrap = el('div','chips');
    var count = el('div','selcount');
    function upd(){ count.innerHTML = 'Selecionadas: <b>' + v3.length + '</b> / 3'; }
    pool.forEach(function(word){
      var c = el('button','chip' + (v3.indexOf(word) >= 0 ? ' sel' : ''), esc(word));
      c.type = 'button';
      c.addEventListener('click', function(){
        var ix = v3.indexOf(word);
        if (ix >= 0){ v3.splice(ix,1); c.classList.remove('sel'); }
        else if (v3.length < 3){ v3.push(word); c.classList.add('sel'); }
        else {
          count.classList.add('shake');
          setTimeout(function(){ count.classList.remove('shake'); }, 450);
        }
        upd();
        clearErr(box.closest('.slide'));
      });
      wrap.appendChild(c);
    });
    upd();
    box.appendChild(wrap);
    box.appendChild(count);
    return;
  }
}

/* ---------- Validação ---------- */
function validate(q){
  var v = answers[q.key];
  switch (q.type){
    case 'text':
    case 'textarea':
      if (q.req && !(v && v.trim())) return 'Este campo é obrigatório.';
      return null;
    case 'ack':
      if (!(v && v.ok)) return 'Para continuar, confirme que está ciente.';
      return null;
    case 'yesno':
      if (!v) return 'Escolha uma das opções para continuar.';
      return null;
    case 'radio':
      if (!(v && v.choice)) return 'Escolha uma das opções para continuar.';
      if (v.choice === '__other' && !v.other.trim()) return 'Escreva a sua opção em “Outro”.';
      return null;
    case 'multi':
      if (!(v && v.list.length)) return 'Selecione ao menos uma opção.';
      if (v.list.indexOf('Outro') >= 0 && !v.other.trim()) return 'Escreva a sua opção em “Outro”.';
      return null;
    case 'chips':
      if (!(v && v.length >= (q.min || 1))) return 'Escolha pelo menos ' + (q.min || 1) + ' características.';
      return null;
    case 'pick3':
      if (!(v && v.length === 3)) return 'Selecione exatamente 3 palavras.';
      return null;
  }
  return null;
}

function onNext(slide, q, btn){
  var msg = validate(q);
  if (msg){
    var e = slide.querySelector('.err');
    e.textContent = msg;
    e.classList.add('show');
    var f = slide.querySelector('.field');
    f.classList.remove('shake'); f.getBoundingClientRect(); f.classList.add('shake');
    return;
  }
  var isLast = slides[cur].n === TOTAL;
  if (isLast) submitFlow(btn);
  else go(1);
}

/* ---------- Compilação das respostas ---------- */
function fmtAnswer(q){
  var v = answers[q.key];
  switch (q.type){
    case 'text':
    case 'textarea':
      return (v && v.trim()) ? v.trim() : '—';
    case 'ack':
      if (!v) return '—';
      return 'Estou ciente.' + (v.extra && v.extra.trim() ? ' | Outras pessoas no projeto: ' + v.extra.trim() : '');
    case 'yesno':
      return v || '—';
    case 'radio':
      if (!v || !v.choice) return '—';
      return v.choice === '__other' ? 'Outro: ' + v.other.trim() : v.choice;
    case 'multi':
      if (!v || !v.list.length) return '—';
      return v.list.map(function(o){ return o === 'Outro' ? 'Outro: ' + v.other.trim() : o; }).join('; ');
    case 'chips':
    case 'pick3':
      return (v && v.length) ? v.join(', ') : '—';
  }
  return '—';
}

function compileEntries(){
  return QUESTIONS.map(function(q,i){
    var skipped = q.skipIf && q.skipIf();
    return {
      k: String(i+1).padStart(2,'0') + ' · ' + q.label,
      v: skipped ? '—' : fmtAnswer(q)
    };
  });
}

function compileText(){
  var lines = ['BRIEFING | IDENTIDADE VISUAL — ' + CONFIG.BRAND.toUpperCase(),
               'Enviado em: ' + new Date().toLocaleString('pt-BR'), ''];
  compileEntries().forEach(function(e){
    lines.push(e.k);
    lines.push(e.v);
    lines.push('');
  });
  return lines.join('\n');
}

function buildPayload(){
  var p = {
    _subject: '📋 Novo briefing — ' + (((answers.q03 || '').split('\n')[0].trim()) || answers.q01 || 'Identidade Visual'),
    _template: 'table',
    _captcha: 'false',
    _honey: ''
  };
  compileEntries().forEach(function(e){ p[e.k] = e.v; });
  p['Enviado em'] = new Date().toLocaleString('pt-BR');
  return p;
}

/* ---------- Envio ---------- */
function sendBriefing(){
  var ctrl = ('AbortController' in window) ? new AbortController() : null;
  var timer = ctrl ? setTimeout(function(){ ctrl.abort(); }, 15000) : null;
  return fetch('https://formsubmit.co/ajax/' + CONFIG.EMAIL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(buildPayload()),
    signal: ctrl ? ctrl.signal : undefined
  }).then(function(res){
    if (timer) clearTimeout(timer);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }).then(function(j){
    if (j && (j.success === 'true' || j.success === true)) return true;
    throw new Error('FormSubmit não confirmou o envio');
  });
}

function submitFlow(btn){
  if (busy) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>&nbsp; Enviando…';
  sendBriefing().then(function(){
    sendState = 'ok'; submitted = true; go(1);
  }).catch(function(){
    sendState = 'fail'; submitted = true; go(1);
  });
}

/* ---------- Tela final ---------- */
function buildThanks(){
  var slide = el('section','slide');
  var inner = el('div','inner');
  var hero = el('div','hero');

  var ok = el('div','okic','<svg viewBox="0 0 52 52"><path d="M14 27l8 8 16-18"/></svg>');
  hero.appendChild(ok);
  hero.appendChild(el('h1', null, 'Obrigado!'));
  hero.appendChild(el('p', null,
    'Esse briefing será o maior norte no desenvolvimento deste projeto, e sempre será consultado como referência para entregar o resultado mais coerente possível.'));

  if (sendState === 'ok'){
    hero.appendChild(el('div','sent','✓ &nbsp;Respostas enviadas para o ' + esc(CONFIG.BRAND)));
  } else {
    var panel = el('div','panel');
    panel.appendChild(el('h3', null, 'Só falta uma coisinha…'));
    panel.appendChild(el('p', null,
      'O envio automático não funcionou neste ambiente. Sem problemas — suas respostas estão salvas abaixo. Copie e me envie por e-mail ou WhatsApp:'));
    var row = el('div','row');

    var copyBtn = el('button','btn','Copiar respostas');
    copyBtn.type = 'button';
    copyBtn.addEventListener('click', function(){
      var txt = compileText();
      function done(){ copyBtn.innerHTML = 'Copiado &nbsp;✓'; setTimeout(function(){ copyBtn.innerHTML = 'Copiar respostas'; }, 2200); }
      if (navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(txt).then(done).catch(function(){ ta.select(); document.execCommand('copy'); done(); });
      } else { ta.select(); document.execCommand('copy'); done(); }
    });
    row.appendChild(copyBtn);

    var mailBtn = el('a','ghostbtn','Abrir no e-mail');
    mailBtn.href = 'mailto:' + CONFIG.EMAIL +
      '?subject=' + encodeURIComponent('Briefing | Identidade Visual') +
      '&body=' + encodeURIComponent(compileText());
    mailBtn.style.textDecoration = 'none';
    mailBtn.style.display = 'inline-flex';
    mailBtn.style.alignItems = 'center';
    row.appendChild(mailBtn);

    if (CONFIG.WHATSAPP){
      var wa = el('a','ghostbtn','Enviar no WhatsApp');
      wa.href = 'https://wa.me/' + CONFIG.WHATSAPP + '?text=' + encodeURIComponent(compileText());
      wa.target = '_blank';
      wa.rel = 'noopener';
      wa.style.textDecoration = 'none';
      wa.style.display = 'inline-flex';
      wa.style.alignItems = 'center';
      row.appendChild(wa);
    }

    var retry = el('button','ghostbtn','Tentar enviar de novo');
    retry.type = 'button';
    retry.addEventListener('click', function(){
      retry.textContent = 'Enviando…'; retry.disabled = true;
      sendBriefing().then(function(){
        sendState = 'ok';
        panel.innerHTML = '';
        panel.style.textAlign = 'center';
        panel.appendChild(el('div','sent','✓ &nbsp;Respostas enviadas para o ' + esc(CONFIG.BRAND)));
      }).catch(function(){
        retry.textContent = 'Tentar enviar de novo'; retry.disabled = false;
      });
    });
    row.appendChild(retry);

    panel.appendChild(row);
    var ta = document.createElement('textarea');
    ta.readOnly = true;
    ta.value = compileText();
    panel.appendChild(ta);
    hero.appendChild(panel);
  }

  inner.appendChild(hero);
  slide.appendChild(inner);
  return slide;
}

/* ---------- Teclado ---------- */
document.addEventListener('keydown', function(e){
  if (e.key !== 'Enter') return;
  var s = slides[cur];
  if (s.type === 'thanks') return;
  if (s.type === 'welcome'){ e.preventDefault(); go(1); return; }
  var ae = document.activeElement;
  if (ae && ae.tagName === 'TEXTAREA' && !(e.metaKey || e.ctrlKey)) return;
  e.preventDefault();
  var slideEl = stage.querySelector('.slide:not(.leave-l):not(.leave-r)');
  if (!slideEl) return;
  var btn = slideEl.querySelector('.actions .btn');
  if (btn && !btn.disabled) onNext(slideEl, s.q, btn);
});

/* ---------- Proteção contra fechamento acidental ---------- */
window.addEventListener('beforeunload', function(e){
  if (submitted) return;
  var started = Object.keys(answers).length > 0;
  if (!started) return;
  e.preventDefault();
  e.returnValue = '';
});

/* ---------- Início ---------- */
stage.appendChild(buildSlide(slides[0]));
updateFooter();
</script>
</body>
</html>
